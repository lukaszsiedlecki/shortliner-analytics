version: '3.8'

services:
  shortliner-analytics:
    build: .
    container_name: shortliner-analytics-app
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://<k8s-postgres-host>:5432/shortliner_analytics
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: <k8s-kafka-host>:9092
