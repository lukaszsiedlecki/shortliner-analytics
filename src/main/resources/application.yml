server:
  port: 8082

spring:
  application:
    name: shortliner-analytics

  datasource:
    url: jdbc:postgresql://localhost:5432/shortliner_analytics
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true

  kafka:
    bootstrap-servers: localhost:9092

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

analytics:
  aggregation:
    interval-ms: 300000

logging:
  level:
    com.shortliner.analytics: DEBUG
    org.springframework.kafka: INFO
