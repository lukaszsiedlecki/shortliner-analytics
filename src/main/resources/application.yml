server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: shortliner-analytics

  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    database-platform: ${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
    properties:
      hibernate:
        jdbc:
          batch_size: ${HIBERNATE_BATCH_SIZE:50}
        order_inserts: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

analytics:
  aggregation:
    interval-ms: ${AGGREGATION_INTERVAL_MS:300000}

logging:
  level:
    com.shortliner.analytics: ${LOG_LEVEL_APP:DEBUG}
    org.springframework.kafka: ${LOG_LEVEL_KAFKA:INFO}
